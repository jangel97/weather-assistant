llm:
  timeout: 300
  max_retries: 2

pipeline:
  max_tool_rounds: 3
  max_tool_result_chars: 2000

models:
  classifier:
    model: ${LLM_MODEL_CLASSIFIER}
    temperature: 0.0
    max_tokens: 1024
  tool_selector:
    model: ${LLM_MODEL_TOOL_SELECTOR}
    temperature: 0.0
    max_tokens: 1024
  tool_arguments:
    model: ${LLM_MODEL_TOOL_ARGUMENTS}
    temperature: 0.0
    max_tokens: 1024
  answer:
    model: ${LLM_MODEL_ANSWER}
    temperature: 0.3
    max_tokens: 4096
  rewriter:
    model: ${LLM_MODEL_REWRITER}
    temperature: 0.0
    max_tokens: 1024
  extractor:
    model: ${LLM_MODEL_EXTRACTOR}
    temperature: 0.0
    max_tokens: 256
